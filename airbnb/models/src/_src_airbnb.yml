version: 2

sources:
  - name: raw
    database: airbnb
    schema: raw
    tables:
      - name: listings
        identifier: raw_listings

      - name: hosts
        identifier: raw_hosts

      - name: reviews
        identifier: raw_reviews
        config: 
          loaded_at_field: date
          freshness: 
              warn_after: {count: 1, period: day}
              error_after: {count: 2, period: day}